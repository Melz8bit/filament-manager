<div id="spool-{{ spool.pk }}"
     class="bg-white rounded-xl border border-red-200 shadow-sm overflow-hidden flex flex-col">
    <div class="p-4">
        <div class="flex items-start gap-3">
            <div class="w-11 h-11 rounded-full flex-shrink-0 ring-2 ring-red-200"
                 style="background-color: {{ spool.color_hex }}"></div>
            <div>
                <p class="text-sm font-semibold text-gray-900">Delete this spool?</p>
                <p class="mt-0.5 text-sm text-gray-500">{{ spool }}</p>
                <p class="mt-2 text-xs text-gray-400">This cannot be undone. Print history using this spool will remain.</p>
            </div>
        </div>
        <div class="mt-4 flex gap-2">
            <form method="post" action="{% url 'spool-delete' spool.pk %}">
                {% csrf_token %}
                <button type="submit"
                        hx-post="{% url 'spool-delete' spool.pk %}"
                        hx-target="#spool-{{ spool.pk }}"
                        hx-swap="delete"
                        class="rounded-md bg-red-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-red-700 transition-colors">
                    Confirm Delete
                </button>
            </form>
            <a href="{% url 'spool-list' %}"
               class="rounded-md border border-gray-300 px-3 py-1.5 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                Cancel
            </a>
        </div>
    </div>
</div>
