{% extends 'base.html' %}

{% block title %}Log a Print — Filament Tracker{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Log a Print</h1>
        <p class="mt-1 text-sm text-gray-500">Upload a sliced file to record filament usage.</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <form method="post" enctype="multipart/form-data" novalidate>
            {% csrf_token %}

            <div class="space-y-5">

                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">
                        Print Name <span class="font-normal text-gray-400">(optional — defaults to filename)</span>
                    </label>
                    <div class="mt-1">
                        <input type="text" id="name" name="name"
                               placeholder="e.g. Benchy, Phone Stand"
                               class="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                    </div>
                </div>

                <div>
                    <label for="source_file" class="block text-sm font-medium text-gray-700">
                        Slicer File
                    </label>
                    <div class="mt-1">
                        <input type="file" id="source_file" name="source_file"
                               accept=".3mf,.gcode"
                               class="block w-full text-sm text-gray-500
                                      file:mr-4 file:py-2 file:px-4
                                      file:rounded-md file:border-0
                                      file:text-sm file:font-medium
                                      file:bg-indigo-50 file:text-indigo-700
                                      hover:file:bg-indigo-100">
                    </div>
                    <p class="mt-1.5 text-xs text-gray-400">Accepts .3mf (OrcaSlicer, Bambu Studio) or .gcode</p>
                </div>

            </div>

            <div class="mt-6 flex items-center justify-between gap-3">
                <a href="{% url 'manual-entry' %}"
                   class="text-sm text-indigo-600 hover:text-indigo-800 transition-colors">
                    No file? Enter manually →
                </a>
                <div class="flex items-center gap-3">
                    <a href="{% url 'spool-list' %}"
                       class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                        Cancel
                    </a>
                    <button type="submit"
                            class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 transition-colors">
                        Upload & Parse
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
