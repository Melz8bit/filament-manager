{% extends 'base.html' %}

{% block title %}Edit Queue Entry — Filament Tracker{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="mb-6">
        <a href="{% url 'queue-list' %}" class="text-sm text-gray-500 hover:text-gray-700">← Queue</a>
        <h1 class="mt-2 text-2xl font-bold text-gray-900">Edit Queue Entry</h1>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="space-y-5">

                <div>
                    <label for="source_url" class="block text-sm font-medium text-gray-700">URL</label>
                    <div class="mt-1">
                        <input type="url" id="source_url" name="source_url"
                               value="{{ entry.source_url }}"
                               placeholder="https://makerworld.com/..."
                               class="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"
                               autofocus>
                    </div>
                </div>

                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">
                        Name <span class="font-normal text-gray-400">(optional)</span>
                    </label>
                    <div class="mt-1">
                        <input type="text" id="name" name="name"
                               value="{{ entry.name }}"
                               placeholder="e.g. Articulated Dragon"
                               class="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                    </div>
                </div>

                <div>
                    <label for="queue_notes" class="block text-sm font-medium text-gray-700">
                        Notes <span class="font-normal text-gray-400">(optional)</span>
                    </label>
                    <div class="mt-1">
                        <textarea id="queue_notes" name="queue_notes" rows="3"
                                  placeholder="e.g. print in red and white"
                                  class="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">{{ entry.queue_notes }}</textarea>
                    </div>
                </div>

            </div>

            <div class="mt-6 flex items-center justify-end gap-3">
                <a href="{% url 'queue-list' %}"
                   class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                    Cancel
                </a>
                <button type="submit"
                        class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 transition-colors">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
