name: Deploy to Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/pi/filament-manager
          git pull

      - name: Build image
        run: |
          cd /home/pi/filament-manager
          docker compose build

      - name: Django system check
        run: |
          cd /home/pi/filament-manager
          docker compose run --rm web python manage.py check

      - name: Deploy
        run: |
          cd /home/pi/filament-manager
          docker compose up -d
